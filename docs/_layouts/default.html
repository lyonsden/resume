<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }}</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>:root{--color-launch-green:#7BB342;--color-launch-green-hover:#6A9B38;--color-forest-green:#2D5016;--color-forest-green-light:#3D6B1E;--color-midnight-black:#1A1A1A;--color-la-silver:#B8B8B8;--color-la-silver-light:#D0D0D0;--bg-primary:#0D0D0D;--bg-secondary:#1A1A1A;--bg-tertiary:#262626;--bg-card:#1E1E1E;--bg-card-hover:#2A2A2A;--text-primary:#F5F5F5;--text-secondary:#B8B8B8;--text-muted:#808080;--text-accent:var(--color-launch-green);--border-color:#333;--border-accent:var(--color-launch-green);--shadow-sm:0 1px 2px rgba(0,0,0,.3);--shadow-md:0 4px 6px rgba(0,0,0,.4);--shadow-lg:0 10px 15px rgba(0,0,0,.5);--radius-sm:4px;--radius-md:8px;--radius-lg:12px;--font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--font-mono:"JetBrains Mono","Fira Code","Consolas",monospace;--transition-fast:.15s ease;--transition-normal:.25s ease;--transition-slow:.35s ease}[data-theme=light]{--bg-primary:#FFF;--bg-secondary:#F5F5F5;--bg-tertiary:#E8E8E8;--bg-card:#FAFAFA;--bg-card-hover:#F0F0F0;--text-primary:#1A1A1A;--text-secondary:#4A4A4A;--text-muted:#7A7A7A;--text-accent:var(--color-forest-green);--border-color:#E0E0E0;--border-accent:var(--color-forest-green)}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth;font-size:16px}body{font-family:var(--font-sans);background-color:var(--bg-primary);color:var(--text-primary);line-height:1.6;-webkit-font-smoothing:antialiased}a{color:var(--text-accent);text-decoration:none;transition:color var(--transition-fast)}a:hover{color:var(--color-launch-green-hover)}.container{max-width:960px;margin:0 auto;padding:0 24px}.section{padding:80px 0}.section-title{font-size:2rem;font-weight:700;margin-bottom:32px;color:var(--text-primary);position:relative;display:inline-block}.section-title::after{content:"";position:absolute;bottom:-8px;left:0;width:60px;height:3px;background:var(--color-launch-green)}.badge{display:inline-block;padding:4px 12px;background:var(--bg-tertiary);color:var(--text-accent);border:1px solid var(--border-color);border-radius:100px;font-size:.8rem;font-weight:500;font-family:var(--font-mono)}.header{position:fixed;top:0;left:0;right:0;z-index:100;background:color-mix(in srgb,var(--bg-primary) 85%,transparent);border-bottom:1px solid var(--border-color);backdrop-filter:blur(12px)}.header-inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:960px;margin:0 auto;padding:0 24px}.logo{font-size:1.5rem;font-weight:800;color:var(--text-accent);letter-spacing:-1px}.nav{display:flex;align-items:center;gap:32px}.nav-link{color:var(--text-secondary);font-size:.9rem;font-weight:500}.nav-link:hover{color:var(--text-primary)}.theme-toggle{background:none;border:none;cursor:pointer;color:var(--text-secondary);padding:8px;border-radius:var(--radius-sm);display:flex;align-items:center}.theme-toggle:hover{color:var(--text-primary);background:var(--bg-tertiary)}.icon-sun,.icon-moon{display:none}[data-theme=dark] .icon-sun,[data-theme=light] .icon-moon{display:block}.hero{min-height:100vh;display:flex;align-items:center;padding-top:64px;position:relative;overflow:hidden}.hero::before{content:"";position:absolute;top:-50%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,var(--color-launch-green) 0%,transparent 70%);opacity:.08;pointer-events:none}.hero-greeting{color:var(--text-accent);font-family:var(--font-mono);font-size:1rem;margin-bottom:16px}.hero-name{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:800;line-height:1.1;letter-spacing:-2px;margin-bottom:16px;color:var(--text-primary)}.hero-title{font-size:clamp(1.25rem,3vw,2rem);font-weight:400;color:var(--text-secondary);margin-bottom:24px}.hero-description{font-size:1.1rem;color:var(--text-secondary);max-width:540px;margin-bottom:40px;line-height:1.7}.hero-actions{display:flex;gap:16px}.btn{display:inline-flex;align-items:center;padding:12px 28px;border-radius:var(--radius-md);font-size:.95rem;font-weight:600;cursor:pointer}.btn-primary{background:var(--color-launch-green);color:#000;border:2px solid var(--color-launch-green)}.btn-primary:hover{background:var(--color-launch-green-hover);border-color:var(--color-launch-green-hover);color:#000}.timeline{position:relative;padding-left:32px}.timeline::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--color-launch-green),transparent)}.timeline-item{position:relative;padding-bottom:48px}.timeline-item:last-child{padding-bottom:0}.timeline-item::before{content:"";position:absolute;left:-36px;top:8px;width:10px;height:10px;border-radius:50%;background:var(--color-launch-green);border:2px solid var(--bg-primary)}.timeline-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}.timeline-role{font-size:1.25rem;font-weight:700;color:var(--text-primary);margin-bottom:4px}.timeline-company{color:var(--text-secondary);font-size:.95rem}.timeline-period{color:var(--text-muted);font-family:var(--font-mono);font-size:.85rem;white-space:nowrap}.timeline-summary{color:var(--text-secondary);font-style:italic;margin-bottom:16px}.timeline-highlights{list-style:none}.timeline-highlights li{position:relative;padding-left:20px;padding-bottom:12px;color:var(--text-secondary)}.timeline-highlights li::before{content:"▸";position:absolute;left:0;color:var(--text-accent)}.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-bottom:48px}.skill-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:24px}.skill-card:hover{border-color:var(--border-accent)}.skill-category{font-size:1rem;font-weight:600;color:var(--text-primary);margin-bottom:16px}.skill-tags{display:flex;flex-wrap:wrap;gap:8px}.skill-card .badge{padding:6px 12px}.skill-card .badge:hover{border-color:var(--text-accent)}.certifications{padding:24px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md)}.cert-title{font-size:1rem;font-weight:600;color:var(--text-primary);margin-bottom:16px}.cert-badges{display:flex;flex-wrap:wrap;gap:8px}.badge-cert{background:transparent;border-color:var(--color-launch-green)}.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px}.project-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:24px;display:flex;flex-direction:column;gap:16px}.project-card:hover{border-color:var(--border-accent)}.project-title{font-size:1.15rem;font-weight:700;color:var(--text-primary)}.project-title a{color:var(--text-primary)}.project-title a:hover{color:var(--text-accent)}.project-description{color:var(--text-secondary);font-size:.95rem;line-height:1.6;flex-grow:1}.project-tags{display:flex;flex-wrap:wrap;gap:8px}.footer{padding:48px 0;border-top:1px solid var(--border-color)}.footer-content{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px}.footer-name{font-size:1.25rem;font-weight:700;color:var(--text-primary)}.footer-role{color:var(--text-secondary);font-size:.9rem}.footer-links{display:flex;gap:24px}.footer-links a{color:var(--text-secondary);font-size:.9rem}.footer-copy{color:var(--text-muted);font-size:.85rem}@media(max-width:640px){.nav{gap:16px}.nav-link{display:none}.timeline-header{flex-direction:column}.timeline{padding-left:20px}.timeline-item::before{left:-24px}}.hero-actions{flex-direction:column}@media(min-width:641px){.hero-actions{flex-direction:row}}</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="#top" class="logo">ML</a>
    <nav class="nav">
      <a href="#experience" class="nav-link">Experience</a>
      <a href="#skills" class="nav-link">Skills</a>
      <a href="#projects" class="nav-link">Projects</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </div>
</header>
<main>
{{ content }}
</main>
<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-info"><p class="footer-name">Michael Lyons</p><p class="footer-role">Staff Technology Engineer</p></div>
    </div>
    <p class="footer-copy">Built with Jekyll.</p>
  </div>
</footer>
<script>const theme=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',theme);document.getElementById('theme-toggle')?.addEventListener('click',()=>{const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);localStorage.setItem('theme',next)})</script>
</body>
</html>
